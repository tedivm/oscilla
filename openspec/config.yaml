schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.

rules:
  # proposal:
  #   - Keep proposals under 500 words
  #   - Always include a "Non-goals" section
  tasks:
    - Do not attempt to estimate the time a task will take.
  design:
    - When creating diagrams always use Mermaid Diagrams instead of Ascii Diagrams.
    - Every design document must include a Documentation Plan section that names each document to be created or updated,
      its intended audience, and the specific topics it must cover.
    - Every design document must include a Testing Philosophy section (or equivalent) that describes the test tiers, 
      required fixtures, and which behaviours each tier verifies.
    - Documentation and testing sections must be as detailed and specific as the implementation sections. Vague entries 
      like "write tests" or "update the docs" are not acceptable.
    - Every changed or new function, method, and class must be shown as a complete Python code block — not a summary, 
      not a signature stub, not pseudocode. Include the full implementation with all logic. This includes private helper
      functions and utilities introduced to support the change, not just the primary entry points.
    - For each modified file, show a "before" code block (the existing code) and an "after" code block (the 
      replacement). Do not describe what to change in prose alone; always include the actual code.
    - When a function's signature or contract changes, identify every call site in the codebase and show each updated 
      call in a code block. A change is not fully specified if callers are only mentioned in prose.
    - Edge cases and exceptional conditions must be explicitly enumerated per section — list each case and the exact 
      handling (what the code does, what the user sees, what is logged). Do not bury edge cases in prose.
    - Test examples in the Testing Philosophy section must be complete runnable test functions with setup, assertions, 
      and any required fixtures — not just a table of test names or one-line descriptions.
    - If the tests require a stub or mock (e.g. MockTUI, a fake registry), show the complete stub class implementation 
      alongside the test functions, not just a reference to it by name.
    - Use inline code comments to document language gotchas, design tradeoffs, and non-obvious implementation decisions 
      at the point in the code where they matter — not only in surrounding prose.
