apiVersion: oscilla/v1
kind: CombatSystem
metadata:
  name: standard-combat
spec:
  # Defeat conditions
  player_defeat_condition:
    type: character_stat
    name: hp
    lte: 0

  enemy_defeat_condition:
    type: enemy_stat
    stat: hp
    lte: 0

  # Enemy attacks: raw attack value
  enemy_damage_formulas:
    - formula: "{{ clamp(enemy_stats.get('attack', 0), 0, 9999) * -1 }}"
      target: player
      target_stat: hp
      display: "Enemy strikes"

  turn_order: player_first
  player_turn_mode: choice
  # basic-strike is always available as a system skill; Flee is appended automatically
  # by the engine in choice mode.
  system_skills:
    - skill: basic-strike
  skill_contexts:
    - combat
