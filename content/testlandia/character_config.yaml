apiVersion: oscilla/v1
kind: CharacterConfig
metadata:
  name: testlandia-character
spec:
  public_stats:
    - name: xp
      type: int
      default: 0
      description: "Experience points. Sum of xp earned during adventures."
      bounds:
        min: 0
    - name: level
      type: int
      derived: "{{ 1 + (1 if player.stats['xp'] >= 100 else 0) + (1 if player.stats['xp'] >= 300 else 0) + (1 if player.stats['xp'] >= 600 else 0) + (1 if player.stats['xp'] >= 1000 else 0) + (1 if player.stats['xp'] >= 1500 else 0) }}"
      description: "Current level derived from xp. Starts at 1; caps at 6 with testlandia thresholds."
    - name: hp
      type: int
      default: 0
      description: "Current hit points."
      bounds:
        min: 0
    - name: max_hp
      type: int
      default: 0
      description: "Maximum hit points."
    - name: constitution
      type: int
      default: 10
      description: "Constitution score. Drives HP-on-level-up bonus via constitution_bonus."
    - name: constitution_bonus
      type: int
      derived: "{{ floor((player.stats['constitution'] - 10) / 2) }}"
      description: "D&D-style constitution modifier: floor((constitution - 10) / 2)."
    - name: strength
      type: int
      default: 10
      description: "Standard int stat. Target for stat_change and stat_set tests."
    - name: speed
      type: int
      default: 1
      description: "Int stat. Tests integer delta and set operations."
    - name: is_blessed
      type: bool
      default: false
      description: "Bool stat. Tests stat_set toggle to true/false."
    - name: gold
      type: int
      default: 0
      description: "Standard int currency stat. Has bounds [0, 1000] for clipping tests."
      bounds:
        min: 0
        max: 1000
    - name: mana
      type: int
      default: 50
      description: "Mana resource for skill costs. Bounded [0, 50]."
      bounds:
        min: 0
        max: 50
    - name: max_mana
      type: int
      default: 50
      description: "Maximum mana. Used by skill_resources."
  hidden_stats:
    - name: debug_counter
      type: int
      default: 0
      description: "Hidden int. Incremented by condition-lab adventures."
    - name: legacy_power
      type: int
      default: 0
      description: "Accumulated legacy bonus from previous prestige runs. Carries forward on prestige."

  skill_resources:
    - name: mana
      stat: mana
      max_stat: max_mana

  equipment_slots:
    - name: weapon
      displayName: "Weapon"
      accepts:
        - weapon

    - name: off_hand
      displayName: "Off Hand"
      accepts:
        - weapon
        - shield

    - name: armor
      displayName: "Armor"
      accepts:
        - armor
