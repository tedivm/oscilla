apiVersion: oscilla/v1
kind: Adventure
metadata:
  name: easy-fight
spec:
  displayName: "Easy Combat Test"
  description: "Guaranteed victory combat test."
  steps:
    - type: combat
      enemy: glass-dummy
      on_win:
        steps:
          - type: narrative
            text:
              "[bold]Victory![/bold] You defeated the Glass Dummy without breaking a
              sweat. Combat complete."
      on_defeat:
        steps:
          - type: narrative
            text:
              "[bold]Defeat![/bold] The Glass Dummy somehow bested you. This was
              unexpected — the dummy has only 1 HP. Something may be wrong."
      on_flee:
        steps:
          - type: narrative
            text:
              "[bold]Fled![/bold] You fled from the Glass Dummy. Combat ended without a
              result."
