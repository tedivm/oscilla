apiVersion: oscilla/v1
kind: Adventure
metadata:
  name: flee-test
spec:
  displayName: "Flee Test Combat"
  description: "Combat designed for flee testing."
  steps:
    - type: combat
      enemy: iron-golem
      on_win:
        steps:
          - type: narrative
            text: "[bold]Victory![/bold] You defeated the Iron Golem. Combat complete."
      on_defeat:
        steps:
          - type: narrative
            text: "[bold]Defeat![/bold] The Iron Golem crushed you. Combat ended in defeat."
      on_flee:
        steps:
          - type: narrative
            text:
              "[bold]FLEE TEST SUCCESSFUL[/bold] — You successfully fled from combat.
              Combat ended without a result."
