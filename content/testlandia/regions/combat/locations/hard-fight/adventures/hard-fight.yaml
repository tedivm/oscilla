apiVersion: oscilla/v1
kind: Adventure
metadata:
  name: hard-fight
spec:
  displayName: "Hard Combat Test"
  description: "Likely defeat combat test."
  steps:
    - type: combat
      enemy: iron-golem
      on_win:
        steps:
          - type: narrative
            text:
              "[bold]Victory![/bold] You miraculously defeated the Iron Golem! Combat
              complete."
      on_defeat:
        steps:
          - type: narrative
            text:
              "[bold]Defeat![/bold] The Iron Golem overpowered you, as expected. Combat
              ended in defeat."
      on_flee:
        steps:
          - type: narrative
            text:
              "[bold]Fled![/bold] You wisely retreated from the Iron Golem. Combat ended
              without a result."
