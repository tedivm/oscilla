apiVersion: game/v1
kind: Location
metadata:
  name: test-quest-hub
spec:
  displayName: "Quest Testing Hub"
  description: "Central hub for testing quest activation and completion mechanics."
  region: quests
  adventures:
    - ref: test-quest-start
      weight: 100
    - ref: test-quest-finish
      weight: 100
    - ref: test-stage-condition-start
      weight: 100
    - ref: test-stage-gate
      weight: 100
      requires:
        type: quest_stage
        quest: test-stage-condition-quest
        stage: searching
    - ref: test-failable-quest-start
      weight: 100
    - ref: test-fail-quest
      weight: 100
