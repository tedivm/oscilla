apiVersion: game/v1
kind: Adventure
metadata:
  name: test-fail-quest
spec:
  displayName: "Trigger Quest Failure"
  description: "Grants the test-quest-fail-trigger milestone, causing test-failable-quest to fail (if active). Validates that
    fail_condition fires and fail_effects (hp -5) run."
  steps:
    - type: narrative
      text: "Something goes wrong. The quest is doomed."
      effects:
        - type: milestone_grant
          milestone: test-quest-fail-trigger
