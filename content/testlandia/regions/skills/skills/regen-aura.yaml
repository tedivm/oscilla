apiVersion: oscilla/v1
kind: Skill
metadata:
  name: regen-aura
spec:
  displayName: "Regen Aura"
  description: "Surround yourself with a restorative aura, healing 15 HP per turn for 3 turns."
  contexts:
    - combat
  cost:
    stat: mana
    amount: 10
  cooldown:
    scope: turn
    count: 3
  use_effects:
    - type: apply_buff
      buff_ref: regen-buff
      target: player
      variables: {}
