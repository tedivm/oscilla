apiVersion: oscilla/v1
kind: Adventure
metadata:
  name: archetype-grant-warrior
spec:
  displayName: "Become a Warrior"
  description: "Tests archetype_add: grants test-warrior; no-op if already held (no force flag)."
  requires:
    type: not
    condition:
      type: has_archetype
      name: test-warrior
  steps:
    - type: narrative
      text: "You undergo the warrior's trial and emerge changed. Strength +3, +10 XP, and a passive boost."
      effects:
        - type: archetype_add
          name: test-warrior
        - type: end_adventure
          outcome: completed
