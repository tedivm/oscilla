apiVersion: game/v1
kind: Adventure
metadata:
  name: gain-legendary-gem
spec:
  displayName: "Legendary Gem Drop Test"
  description: "Awards a Legendary Test Gem (test-legendary label). Once held, the passive effect in game.yaml adds +2 to
    strength. Check your stats panel to confirm."
  steps:
    - type: narrative
      text: "Half-buried in the earth you find a gem that glows with an inner light. You feel stronger just holding it."
      effects:
        - type: item_drop
          loot:
            - item: test-legendary-gem
              weight: 100
