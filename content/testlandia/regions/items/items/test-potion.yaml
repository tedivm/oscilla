apiVersion: oscilla/v1
kind: Item
metadata:
  name: test-potion
spec:
  displayName: "Test Potion"
  description: "A glowing vial that uses a custom effect for healing."
  category: consumable
  stackable: true
  use_effects:
    - type: custom_effect
      name: heal_percentage
      params:
        percent: 20
  consumed_on_use: true
  value: 0
