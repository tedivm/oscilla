apiVersion: oscilla/v1
kind: Adventure
metadata:
  name: test-inline-loot
spec:
  displayName: "Inline Loot Test"
  description: "Adventure with an inline item_drop groups effect."
  steps:
    - type: narrative
      text: "You find a hidden cache."
      effects:
        - type: item_drop
          groups:
            - count: 1
              method: weighted
              entries:
                - item: test-item
                  weight: 100
                  amount: 1
