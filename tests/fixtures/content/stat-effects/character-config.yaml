apiVersion: game/v1
kind: CharacterConfig
metadata:
  name: test-character-config
spec:
  public_stats:
    - name: strength
      type: int
      default: 10
      description: "Physical power"
    - name: speed
      type: int
      default: 5
      description: "Movement speed (integer)"
    - name: is_blessed
      type: bool
      default: false
      description: "Has blessing"
  hidden_stats: []
