apiVersion: oscilla/v1
kind: Skill
metadata:
  name: test-skill-shield
spec:
  displayName: "Iron Shield"
  description: "Apply a damage-reduction buff to the player."
  contexts:
    - combat
  cost:
    stat: mana
    amount: 4
  cooldown:
    scope: turn
    count: 2
  use_effects:
