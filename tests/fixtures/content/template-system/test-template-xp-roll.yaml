apiVersion: oscilla/v1
kind: Adventure
metadata:
  name: test-template-xp-roll
spec:
  displayName: "Template XP Roll Test"
  description: "Adventure that uses roll() in stat_change xp amount."
  steps:
    - type: narrative
      text: "You gain experience!"
      effects:
        - type: stat_change
          stat: xp
          amount: "{{ roll(5, 15) }}"
