name: Frontend Accessibility

on:
  push:
  pull_request:

jobs:
  frontend-accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: make install

      - name: Build Frontend
        run: make frontend_build

      - name: Install Playwright Browsers
        run: make frontend_playwright_install_ci

      - name: Run Accessibility Tests (${{ matrix.browser }})
        run: make frontend_a11y BROWSER=${{ matrix.browser }}

      - name: Upload Accessibility Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-${{ matrix.browser }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
