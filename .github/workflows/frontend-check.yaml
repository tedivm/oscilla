name: Frontend Type Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: make frontend_install

      - name: Run Svelte Type Check
        run: make frontend_check
